spring.application.name=urbanease

# Profile Configuration
spring.profiles.active=dev

# Enable Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=675c13837c89be397468526619cc779373410f3fde3387722c0a04cd4fc95ef0
jwt.expiration=86400000

# Email Configuration
